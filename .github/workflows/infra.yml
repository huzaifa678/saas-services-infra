name: infra

on:
  workflow_dispatch:
  workflow_run:
    branches: [main]

jobs:
  root:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      ecr_auth:         ${{ steps.outputs.outputs.ecr_auth }}
      ecr_subscription: ${{ steps.outputs.outputs.ecr_subscription }}
      ecr_billing:      ${{ steps.outputs.outputs.ecr_billing }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.14.8"
          terraform_wrapper: false

      - name: terraform init
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="key=prod/terraform.tfstate" -backend-config="region=us-east-1"

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform validate
        run: terraform validate

      - name: terraform plan
        run: terraform plan -var-file=prod.tfvars -out=tfplan
        env:
          TF_VAR_keycloak_db_password:       ${{ secrets.TF_VAR_KEYCLOAK_DB_PASSWORD }}
          TF_VAR_subscription_db_password:   ${{ secrets.TF_VAR_SUBSCRIPTION_DB_PASSWORD }}
          TF_VAR_billing_db_password:        ${{ secrets.TF_VAR_BILLING_DB_PASSWORD }}
          TF_VAR_usage_db_password:          ${{ secrets.TF_VAR_USAGE_DB_PASSWORD }}
          TF_VAR_opensearch_master_password: ${{ secrets.TF_VAR_OPENSEARCH_MASTER_PASSWORD }}
          TF_VAR_openai_api_key:             ${{ secrets.TF_VAR_OPENAI_API_KEY }}
          TF_VAR_gateway_jwt_secret:         ${{ secrets.TF_VAR_GATEWAY_JWT_SECRET }}

      - name: terraform apply
        run: terraform apply -auto-approve tfplan

      - name: capture ECR outputs
        id: outputs
        run: |
          ECR_URLS=$(terraform output -json ecr_repository_urls)
          echo "ecr_auth=$(echo $ECR_URLS         | jq -r '.["auth-service"]')"         >> $GITHUB_OUTPUT
          echo "ecr_subscription=$(echo $ECR_URLS | jq -r '.["subscription-service"]')" >> $GITHUB_OUTPUT
          echo "ecr_billing=$(echo $ECR_URLS      | jq -r '.["billing-service"]')"      >> $GITHUB_OUTPUT

  service-modules:
    needs: root
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, auth-service, billing-service, subscription-service]

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.14.8"
          terraform_wrapper: false

      - name: terraform init
        working-directory: ${{ matrix.service }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=us-east-1" 

      - name: terraform fmt 
        working-directory: ${{ matrix.service }}
        run: terraform fmt -check -recursive

      - name: terraform validate
        working-directory: ${{ matrix.service }}
        run: terraform validate

      - name: terraform plan
        working-directory: ${{ matrix.service }}
        run: terraform plan -out=tfplan
        env:
          TF_VAR_auth_jwt_secret:         ${{ secrets.TF_VAR_AUTH_JWT_SECRET }}
          TF_VAR_auth_jwt_refresh_secret: ${{ secrets.TF_VAR_AUTH_JWT_REFRESH_SECRET }}
          TF_VAR_keycloak_jwks_url:       ${{ secrets.TF_VAR_KEYCLOAK_JWKS_URL }}

      - name: terraform apply
        working-directory: ${{ matrix.service }}
        run: terraform apply -auto-approve tfplan
