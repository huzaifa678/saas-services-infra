name: infra

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, test, prod]
      layer:
        description: "Target layer"
        required: true
        type: string
  workflow_run:
    workflows: []
    branches: [main]

jobs:
  root:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: live/${{ inputs.environment }}/${{ inputs.layer }}

    permissions:
      id-token: write
      contents: read

    outputs:
      ecr_auth:         ${{ steps.outputs.outputs.ecr_auth }}
      ecr_subscription: ${{ steps.outputs.outputs.ecr_subscription }}
      ecr_billing:      ${{ steps.outputs.outputs.ecr_billing }}

    steps:
      - uses: actions/checkout@v7

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     us-east-1

      - name: Setup Terragrunt
        uses: ./.github/actions/setup-terragrunt

      - name: Apply layer
        run: make apply ENV=${{ inputs.environment }} LAYER=${{ inputs.layer }}
        env:
          TF_VAR_keycloak_db_password:       ${{ secrets.TF_VAR_KEYCLOAK_DB_PASSWORD }}
          TF_VAR_subscription_db_password:   ${{ secrets.TF_VAR_SUBSCRIPTION_DB_PASSWORD }}
          TF_VAR_billing_db_password:        ${{ secrets.TF_VAR_BILLING_DB_PASSWORD }}
          TF_VAR_usage_db_password:          ${{ secrets.TF_VAR_USAGE_DB_PASSWORD }}
          TF_VAR_auth_db_password:           ${{ secrets.TF_VAR_AUTH_DB_PASSWORD }}
          TF_VAR_opensearch_master_password: ${{ secrets.TF_VAR_OPENSEARCH_MASTER_PASSWORD }}
          TF_VAR_openai_api_key:             ${{ secrets.TF_VAR_OPENAI_API_KEY }}
          TF_VAR_ava_oidc_client_id:         ${{ secrets.TF_VAR_AVA_OIDC_CLIENT_ID }}
          TF_VAR_ava_oidc_client_secret:     ${{ secrets.TF_VAR_AVA_OIDC_CLIENT_SECRET }}

      - name: capture ECR outputs
        id: outputs
        run: |
          ECR_URLS=$(terraform output -json ecr_repository_urls)
          echo "ecr_auth=$(echo $ECR_URLS         | jq -r '.["auth-service"]')"         >> $GITHUB_OUTPUT
          echo "ecr_subscription=$(echo $ECR_URLS | jq -r '.["subscription-service"]')" >> $GITHUB_OUTPUT
          echo "ecr_billing=$(echo $ECR_URLS      | jq -r '.["billing-service"]')"      >> $GITHUB_OUTPUT

  service-modules:
    needs: root
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: live/${{ inputs.environment }}/${{ matrix.service }}

    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, auth-service, billing-service, subscription-service]

    steps:
      - uses: actions/checkout@v7

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     us-east-1

      - name: Set Terragrunt
        uses: ./.github/actions/setup-terragrunt

      - name: Apply layer
        run: make apply ENV=${{ inputs.environment }} LAYER=${{ inputs.layer }}
        env:
          TF_VAR_auth_jwt_secret:         ${{ secrets.TF_VAR_AUTH_JWT_SECRET }}
          TF_VAR_auth_jwt_refresh_secret: ${{ secrets.TF_VAR_AUTH_JWT_REFRESH_SECRET }}
          TF_VAR_keycloak_jwks_url:       ${{ secrets.TF_VAR_KEYCLOAK_JWKS_URL }}
          TF_VAR_gateway_jwt_secret:      ${{ secrets.TF_VAR_GATEWAY_JWT_SECRET }}
          TF_VAR_stripe_api_key:          ${{ secrets.TF_VAR_STRIPE_API_KEY }}
