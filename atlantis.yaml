version: 3

automerge: false
parallel_plan: true
# Layers share state; a downstream apply reads upstream outputs, so applies are
# serialized and ordered by execution_order_group (= layer index; services = 6).
parallel_apply: false
abort_on_execution_order_fail: true

projects:
  - name: 00-network-dev
    dir: live/dev/00-network
    workspace: dev
    terraform_version: v1.14.8
    workflow: terragrunt
    execution_order_group: 0
    autoplan:
      enabled: true
      when_modified: ["*.hcl", "../env.hcl", "../../_envcommon/00-network.hcl", "../../../root.hcl", "../../../layers/00-network/**/*.tf", "../../../modules/**/*.tf", "../../../policy/**"]

  - name: 10-platform-dev
    dir: live/dev/10-platform
    workspace: dev
    terraform_version: v1.14.8
    workflow: terragrunt
    execution_order_group: 1
    depends_on: ["00-network-dev"]
    autoplan:
      enabled: true
      when_modified: ["*.hcl", "../env.hcl", "../../_envcommon/10-platform.hcl", "../../../root.hcl", "../../../layers/10-platform/**/*.tf", "../../../modules/**/*.tf", "../../../policy/**"]

  - name: 20-data-dev
    dir: live/dev/20-data
    workspace: dev
    terraform_version: v1.14.8
    workflow: terragrunt
    execution_order_group: 2
    depends_on: ["10-platform-dev"]
    autoplan:
      enabled: true
      when_modified: ["*.hcl", "../env.hcl", "../../_envcommon/20-data.hcl", "../../../root.hcl", "../../../layers/20-data/**/*.tf", "../../../modules/**/*.tf", "../../../policy/**"]

  - name: 30-edge-dev
    dir: live/dev/30-edge
    workspace: dev
    terraform_version: v1.14.8
    workflow: terragrunt
    execution_order_group: 3
