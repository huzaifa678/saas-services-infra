version: 3

automerge: false
parallel_plan: true
parallel_apply: false

projects:
  - name: root-dev
    dir: .
    workspace: dev
    terraform_version: v1.14.8
    workflow: env-deploy
    autoplan:
      enabled: true
      when_modified: ["*.tf", "modules/**/*.tf", "environments/dev/*.tfvars", "environments/dev/*.hcl"]

  - name: root-test
