    dir: live/services/test/api-gateway
    workspace: test
    terraform_version: v1.14.8
    workflow: terragrunt
    execution_order_group: 6
    depends_on: ["20-data-test"]
    autoplan:
      enabled: true
      when_modified: ["*.hcl", "../../_envcommon/api-gateway.hcl", "../../../../root.hcl", "../../../../api-gateway/**/*.tf"]

  - name: auth-service-test
    dir: live/services/test/auth-service
